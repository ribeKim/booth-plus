name: booth-plus-oci

x-backend-environment: &backend-environment
  HOST: 0.0.0.0
  PORT: "3000"
  DATABASE_SSL_MODE: verify-full
  DATABASE_SSL_CA_FILE: /run/secrets/oci-postgresql-ca.pem
  CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in deploy/oci/.env}
  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
  RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-300}
  RATE_LIMIT_WRITE_MAX_REQUESTS: ${RATE_LIMIT_WRITE_MAX_REQUESTS:-60}

x-backend-service: &backend-service
  image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in deploy/oci/.env}
  build:
    context: ../..
    dockerfile: apps/backend/Dockerfile
  volumes:
    - ${DATABASE_SSL_CA_HOST_FILE:?Set DATABASE_SSL_CA_HOST_FILE in deploy/oci/.env}:/run/secrets/oci-postgresql-ca.pem:ro,z
  networks:
    - application
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  stop_grace_period: 35s

services:
  migrate:
    <<: *backend-service
    profiles: ["migrate"]
    environment:
      <<: *backend-environment
      DATABASE_URL_FILE: /run/secrets/migration-database-url
    secrets:
      - migration-database-url
    command: ["python", "scripts/migrate.py"]
    restart: "no"

  backend:
    <<: *backend-service
    environment:
      <<: *backend-environment
      DATABASE_URL_FILE: /run/secrets/database-url
    secrets:
      - database-url
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/api/health/storage')"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2.11.4-alpine
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN in deploy/oci/.env}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in deploy/oci/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - application
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

networks:
  application:

volumes:
  caddy-data:
  caddy-config:

secrets:
  database-url:
    file: ${DATABASE_URL_HOST_FILE:?Set DATABASE_URL_HOST_FILE in deploy/oci/.env}
  migration-database-url:
    file: ${MIGRATION_DATABASE_URL_HOST_FILE:?Set MIGRATION_DATABASE_URL_HOST_FILE in deploy/oci/.env}
