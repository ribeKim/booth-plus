name: booth-plus-oci

x-backend-environment: &backend-environment
  HOST: 0.0.0.0
  PORT: "3000"
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: booth_plus
  DATABASE_USER: booth_plus
  DATABASE_PASSWORD_FILE: /run/secrets/postgres-password
  DATABASE_SSL_MODE: disable
  CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in deploy/oci/.env}
  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
  RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-300}
  RATE_LIMIT_WRITE_MAX_REQUESTS: ${RATE_LIMIT_WRITE_MAX_REQUESTS:-60}
  AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in deploy/oci/.env}
  DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:?Set DISCORD_CLIENT_ID in deploy/oci/.env}
  DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:?Set DISCORD_CLIENT_SECRET in deploy/oci/.env}

x-backend-service: &backend-service
  image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in deploy/oci/.env}
  build:
    context: ../..
    dockerfile: apps/backend/Dockerfile
  secrets:
    - postgres-password
  networks:
    - application
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  stop_grace_period: 35s

services:
  postgres:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_DB: booth_plus
      POSTGRES_USER: booth_plus
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    secrets:
      - postgres-password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - application
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booth_plus -d booth_plus"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    shm_size: 256mb
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  migrate:
    <<: *backend-service
    profiles: ["migrate"]
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "scripts/migrate.py"]
    restart: "no"

  backend:
    <<: *backend-service
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/api/health/storage')"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2.11.4-alpine
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN in deploy/oci/.env}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in deploy/oci/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - application
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

networks:
  application:

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

secrets:
  postgres-password:
    file: ${POSTGRES_PASSWORD_HOST_FILE:?Set POSTGRES_PASSWORD_HOST_FILE in deploy/oci/.env}
