name: Bun workflow

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.action != 'closed'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check workspace
        run: bun run check

      - name: Build workspace
        run: bun run build

  release:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Read extension version
        id: package-version
        shell: bash
        run: |
          version="$(node -p 'require("./apps/extension/package.json").version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check release tag
        id: release-tag
        shell: bash
        run: |
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/${{ steps.package-version.outputs.version }}" >/dev/null
          status=$?
          set -e

          case "$status" in
            0) echo "exists=true" >> "$GITHUB_OUTPUT" ;;
            2) echo "exists=false" >> "$GITHUB_OUTPUT" ;;
            *) exit "$status" ;;
          esac

      - name: Setup Bun
        if: steps.release-tag.outputs.exists == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        if: steps.release-tag.outputs.exists == 'false'
        run: bun install --frozen-lockfile

      - name: Check workspace
        if: steps.release-tag.outputs.exists == 'false'
        run: bun run check

      - name: Build extension archive
        if: steps.release-tag.outputs.exists == 'false'
        run: bun run zip

      - name: Resolve extension archive
        if: steps.release-tag.outputs.exists == 'false'
        id: extension-archive
        shell: bash
        run: |
          shopt -s nullglob
          archives=(apps/extension/dist/*.zip)
          if [ "${#archives[@]}" -ne 1 ]; then
            echo "Expected exactly one extension archive, found ${#archives[@]}" >&2
            exit 1
          fi
          echo "path=${archives[0]}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${archives[0]}")" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.release-tag.outputs.exists == 'false'
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.package-version.outputs.version }}
          release_name: v${{ steps.package-version.outputs.version }}
          body: ${{ github.event.pull_request.body }}
          draft: false
          prerelease: false

      - name: Upload release asset
        if: steps.release-tag.outputs.exists == 'false'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ${{ steps.extension-archive.outputs.path }}
          asset_name: ${{ steps.extension-archive.outputs.name }}
          asset_content_type: application/zip
