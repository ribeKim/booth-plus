name: Deploy backend

on:
  push:
    branches: [dev, main]
    paths:
      - ".github/workflows/deploy-backend.yml"
      - "apps/backend/**"
      - "deploy/oci/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/ribekim/booth-plus-backend

concurrency:
  group: booth-plus-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref_name == 'dev' || github.ref_name == 'main'
    runs-on: ubuntu-22.04
    env:
      DATABASE_URL: postgresql://booth_plus:booth_plus@localhost:5432/booth_plus
      DATABASE_SSL_MODE: disable
    services:
      postgres:
        image: postgres:17.10-alpine3.24
        env:
          POSTGRES_DB: booth_plus
          POSTGRES_USER: booth_plus
          POSTGRES_PASSWORD: booth_plus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booth_plus -d booth_plus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: 0.8.11
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: uv sync --project apps/backend --frozen

      - name: Apply PostgreSQL migrations
        run: uv run --project apps/backend python apps/backend/scripts/migrate.py

      - name: Test backend
        run: uv run --project apps/backend pytest -c apps/backend/pyproject.toml apps/backend/tests

      - name: Lint backend
        run: |
          uv run --project apps/backend ruff check apps/backend
          uv run --project apps/backend mypy --config-file apps/backend/pyproject.toml

  publish:
    needs: verify
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image_ref.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Resolve immutable image reference
        id: image_ref
        shell: bash
        run: echo "value=${IMAGE_NAME}@${{ steps.image.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: publish
    runs-on: ubuntu-22.04
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        env:
          TS_OAUTH_CLIENT_ID: ${{ vars.TS_OAUTH_CLIENT_ID }}
          TS_AUDIENCE: ${{ vars.TS_AUDIENCE }}
          TS_TAG: ${{ vars.TS_TAG }}
          OCI_TAILSCALE_HOST: ${{ vars.OCI_TAILSCALE_HOST }}
          OCI_SSH_USER: ${{ vars.OCI_SSH_USER }}
          OCI_DEPLOY_PATH: ${{ vars.OCI_DEPLOY_PATH }}
          APP_HEALTH_URL: ${{ vars.APP_HEALTH_URL }}
        run: |
          set -euo pipefail
          test -n "$TS_OAUTH_CLIENT_ID"
          test -n "$TS_AUDIENCE"
          test -n "$TS_TAG"
          test -n "$OCI_TAILSCALE_HOST"
          test -n "$OCI_SSH_USER"
          test -n "$OCI_DEPLOY_PATH"
          test -n "$APP_HEALTH_URL"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ vars.TS_OAUTH_CLIENT_ID }}
          audience: ${{ vars.TS_AUDIENCE }}
          tags: ${{ vars.TS_TAG }}
          ping: ${{ vars.OCI_TAILSCALE_HOST }}

      - name: Deploy with keyless Tailscale SSH
        shell: bash
        env:
          OCI_TAILSCALE_HOST: ${{ vars.OCI_TAILSCALE_HOST }}
          OCI_SSH_USER: ${{ vars.OCI_SSH_USER }}
          OCI_DEPLOY_PATH: ${{ vars.OCI_DEPLOY_PATH }}
          IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
        run: |
          set -euo pipefail

          [[ "$OCI_DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]

          ssh_options=(
            -o BatchMode=yes
            -o ConnectTimeout=15
            -o StrictHostKeyChecking=accept-new
            -o "UserKnownHostsFile=$RUNNER_TEMP/tailscale_known_hosts"
          )

          git archive --format=tar HEAD | \
            ssh "${ssh_options[@]}" \
              "$OCI_SSH_USER@$OCI_TAILSCALE_HOST" \
              "mkdir -p '$OCI_DEPLOY_PATH' && tar -xf - -C '$OCI_DEPLOY_PATH'"

          ssh "${ssh_options[@]}" \
            "$OCI_SSH_USER@$OCI_TAILSCALE_HOST" \
            "bash -s -- '$IMAGE_REF' '$OCI_DEPLOY_PATH'" <<'REMOTE'
          set -euo pipefail

          image_ref="$1"
          deploy_path="$2"

          [[ "$image_ref" == ghcr.io/ribekim/booth-plus-backend@sha256:* ]]
          [[ "$deploy_path" == /* ]]

          cd "$deploy_path"
          bash deploy/oci/deploy.sh "$image_ref"
          REMOTE

      - name: Verify deployment health
        shell: bash
        env:
          APP_HEALTH_URL: ${{ vars.APP_HEALTH_URL }}
        run: |
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 20 \
            "$APP_HEALTH_URL"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark deployed image
        shell: bash
        env:
          IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${GITHUB_REF_NAME}" \
            "$IMAGE_REF"
